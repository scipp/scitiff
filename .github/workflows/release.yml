name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    shell: bash -l {0}  # required for conda env

jobs:
  build_wheels:
    name: Wheels
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0  # history required so setuptools_scm can determine version
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          environments: build
          frozen: true
      - name: Build wheels
        run: pixi run --frozen build
      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist

  # Skipping conda upload since we directly deploy to conda-forge
  upload_pypi:
    name: Deploy PyPI
    needs: [build_wheels]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@v1.14.0

  docs:
    needs: [upload_pypi]
    uses: ./.github/workflows/docs.yml
    with:
      publish: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    secrets: inherit

  assets:
    name: Upload docs
    needs: docs
    runs-on: ubuntu-slim
    permissions:
      contents: write  # This is needed so that the action can upload the asset
    steps:
    - uses: actions/download-artifact@v8.0.1
      with:
        name: docs_html
    - name: Zip documentation
      run: |
        mv docs_html documentation-${{ github.ref_name }}
        zip -r documentation-${{ github.ref_name }}.zip documentation-${{ github.ref_name }}
    - name: Upload release assets
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: gh release upload ${{ github.ref_name }} ./documentation-${{ github.ref_name }}.zip
