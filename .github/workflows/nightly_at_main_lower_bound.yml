name: Nightly test using lower bound dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * 1-5'

jobs:
  test:
    strategy:
      matrix:
        os: ['ubuntu-24.04']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.71.2
          environments: lower-bound
          frozen: true
      - name: Run unit tests
        run: pixi run -e lower-bound --frozen test
