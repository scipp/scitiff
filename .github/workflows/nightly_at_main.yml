name: Nightly test at main branch

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * 1-5'

jobs:
  test:
    strategy:
      matrix:
        os: ['ubuntu-24.04']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Overwrite pixi toml file and append nightly feature.
        run: bash tools/nightly/override-pixi-config-nightly.sh && cat pixi.toml
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          environments: nightly
          locked: false
          frozen: false
      - name: Run unit tests
        run: pixi run -e nightly test
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: pixi-lock-file
          path: pixi.lock
