name: Nightly test at main branch

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * 1-5'

jobs:
  tests:
    name: Tests
    strategy:
      matrix:
        os: ['ubuntu-24.04']
    uses: ./.github/workflows/test.yml
    with:
      os-variant: ${{ matrix.os }}
      pixi-environment: nightly
    secrets: inherit
