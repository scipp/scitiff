[workspace]
channels = ["conda-forge"]
name = "scitiff"
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]
version = "0.1.0"
requires-pixi = ">=0.68"
# exclude-newer = "14d"

[system-requirements]
# Scipp does not support older OSX versions.
macos = "14.0"

[dependencies]
python = ">=3.11.0"

[feature.project.pypi-dependencies]
# Separate editable project package dependency
# since some environments need release version of the scitiff.
scitiff = { path = ".", editable = true, extras = ["test"] }

[tasks.test]
cmd = "pytest"

# ==================== Build feature ==================
# We build wheels only and depend on conda-forge for conda packaging.
[feature.build.pypi-dependencies]
build = "==1.5.0"

[feature.build.tasks.build]
cmd = "python -m build"

# ==================== Dev feature ====================

[feature.dev.dependencies]
python = "3.11.*"

[feature.dev.pypi-dependencies]
ipykernel = "<7"
jupyterlab = ">=4.4"

[feature.freeze.pypi-dependencies]
packaging = ">=26.0"
rich = ">=15.0.0"
scitiff = "*"

[feature.freeze.tasks.freeze]
cmd = "python tools/dump_scitiff_example.py"

[feature.lower-bound]
solve-strategy = "lowest-direct"

# ==================== Lint feature ====================

[feature.lint.pypi-dependencies]
prek = "==0.3.6"
ruff = ">=0.15"
mypy = "*"

[feature.lint.tasks]
lint = "prek run --all-files"
check = "ruff check ."
format = "ruff format ."
mypy = "python -m mypy ."

# ==================== Docs feature ====================

[feature.docs.pypi-dependencies]
scitiff = { path = ".", editable = true, extras = ["docs"] }

[feature.docs.tasks.dump-metadata-example]
cmd = "scitiff-dump-metadata-example --output docs/_static/example-metadata.json"

[feature.docs.tasks.dump-schemas]
cmd = "scitiff-dev-dump-schemas --output docs/_static/metadata-schema.json"

[feature.docs.tasks.docs]
depends-on = [ "dump-metadata-example", "dump-schemas" ]
args = [ { "arg" = "builder", "choices" = [ "html", "linkcheck" ], default = "html" } ]
cmd = "python -m sphinx -W -j2 -v -b {{builder}} -d .docs_doctrees docs html && python -m sphinx -W -j2 -v -b doctest -d .docs_doctrees -D nbsphinx_execute=never docs html"

# ==================== Environments ====================

[environments]
default = { features = ["project", "dev", "lint"], solve-group = "default" }
docs = { features = ["project", "docs"], solve-group = "docs" }
lint = { features = ["project", "lint"], solve-group = "lint" }
build = { features = ["project", "build"], solve-group = "build" }
freeze = { features = ["freeze"], solve-group = "freeze" }
lower-bound = { features = ["project", "lower-bound"], solve-group = "lower-bound" }
